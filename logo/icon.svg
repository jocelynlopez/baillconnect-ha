<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#0277BD"/>

  <!-- House outline -->
  <polygon points="128,28 24,112 48,112 48,220 208,220 208,112 232,112"
           fill="white" opacity="0.95"/>

  <!-- Door -->
  <rect x="104" y="158" width="48" height="62" rx="4" fill="#0277BD"/>

  <!-- Window left -->
  <rect x="58" y="136" width="36" height="32" rx="4" fill="#0277BD" opacity="0.7"/>

  <!-- Window right -->
  <rect x="162" y="136" width="36" height="32" rx="4" fill="#0277BD" opacity="0.7"/>

  <!-- Snowflake / climate icon in center of roof area -->
  <g transform="translate(128,90)" fill="#0277BD">
    <!-- Snowflake arms -->
    <rect x="-3" y="-22" width="6" height="44" rx="3"/>
    <rect x="-22" y="-3" width="44" height="6" rx="3"/>
    <rect x="-3" y="-22" width="6" height="44" rx="3" transform="rotate(60)"/>
    <rect x="-3" y="-22" width="6" height="44" rx="3" transform="rotate(120)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5"/>
  </g>
</svg>
