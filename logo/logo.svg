<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320">
  <!-- Background -->
  <rect width="720" height="320" rx="32" fill="#0277BD"/>

  <!-- Icon (house + snowflake) -->
  <!-- House -->
  <polygon points="120,40 30,110 52,110 52,200 188,200 188,110 210,110"
           fill="white" opacity="0.95"/>
  <!-- Door -->
  <rect x="100" y="148" width="40" height="52" rx="3" fill="#0277BD"/>
  <!-- Snowflake -->
  <g transform="translate(120,88)" fill="#0277BD">
    <rect x="-3" y="-16" width="5" height="32" rx="2.5"/>
    <rect x="-16" y="-3" width="32" height="5" rx="2.5"/>
    <rect x="-3" y="-16" width="5" height="32" rx="2.5" transform="rotate(60)"/>
    <rect x="-3" y="-16" width="5" height="32" rx="2.5" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="4"/>
  </g>

  <!-- BaillConnect text -->
  <text x="248" y="168"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="86"
        font-weight="700"
        fill="white"
        letter-spacing="-2">BaillConnect</text>

  <!-- Tagline -->
  <text x="250" y="210"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="white"
        opacity="0.75"
        letter-spacing="1">BAILLZONING® Integration</text>
</svg>
